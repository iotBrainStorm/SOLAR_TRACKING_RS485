<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Monitor Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="dashboard.svg" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
      }

      .container {
        flex: 1; /* pushes footer down */
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeSlide 1s ease forwards;
      }

      .main-title {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Minimal smooth animation */
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .dashboard {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Centers each row */
        gap: 25px;
      }

      .card {
        flex: 0 0 300px;
        max-width: 300px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .icon {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        margin-bottom: 12px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ffffff, #cfd9df);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
      }

      /* Elegant underline */
      .title::after {
        content: "";
        display: block;
        width: 40px;
        height: 2px;
        margin: 8px auto 0;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        border-radius: 2px;
        opacity: 0.8;
      }

      .value {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .unit {
        font-size: 16px;
        opacity: 0.7;
      }

      .footer {
        text-align: center;
        margin-top: 100px;
        padding: 15px 10px;
        font-size: 13px;
        opacity: 0.7;
      }
      /* Floating Setup Button */
      .setup-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .setup-btn:hover {
        transform: scale(1.1) rotate(20deg);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 class="main-title">Solar Monitoring Dashboard</h1>
        <div class="subtitle">Real-Time Device Analytics</div>
      </div>

      <div class="dashboard">
        <div class="card">
          <div class="icon">🌡️</div>
          <div class="title">Outside Temperature</div>
          <div class="value" id="outsideTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">🔥</div>
          <div class="title">Solar Plate Temperature</div>
          <div class="value" id="solarTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">💧</div>
          <div class="title">Humidity</div>
          <div class="value" id="humidity">-- <span class="unit">%</span></div>
        </div>

        <div class="card">
          <div class="icon">🌞</div>
          <div class="title">Sunlight</div>
          <div class="value" id="sunPercent">
            -- <span class="unit">%</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">💡</div>
          <div class="title">Lux</div>
          <div class="value" id="luxValue">-- <span class="unit">lx</span></div>
        </div>
      </div>

      <div class="footer">
        <div style="margin-bottom: 8px">
          <span id="dateTime"></span>
        </div>
        <div>ESP32 Real-time Solar Monitor Dashboard | Developer © M.Maity</div>
      </div>
    </div>

    <script>
      function random(min, max, decimals = 1) {
        return (Math.random() * (max - min) + min).toFixed(decimals);
      }

      function updateDashboard() {
        fetch("/sensor.json")
          .then((res) => {
            if (!res.ok) throw new Error("No response");
            return res.json();
          })
          .then((data) => {
            let outside = parseFloat(data.ahtTemp) || 0;
            let solar = parseFloat(data.ntcTemp) || 0;
            let hum = parseFloat(data.humidity) || 0;
            let sunPercent = parseFloat(data.sunlight) || 0;
            let lux = parseFloat(data.lux) || 0;

            let tPrec =
              data.tempPrecision !== undefined ? data.tempPrecision : 2;
            let hPrec = data.humPrecision !== undefined ? data.humPrecision : 2;

            setValue("outsideTemp", outside.toFixed(tPrec), "°C");
            setValue("solarTemp", solar.toFixed(tPrec), "°C");
            setValue("humidity", hum.toFixed(hPrec), "%");
            setValue("sunPercent", sunPercent.toFixed(0), "%");
            setValue("luxValue", lux.toFixed(0), "lx");

            colorOutsideTemp(outside);
            colorSolarTemp(solar);
            colorHumidity(hum);
            colorSun(sunPercent);
            colorLux(lux);
          })
          .catch(() => {
            // If request fails → show zero values
            setValue("outsideTemp", "0", "°C");
            setValue("solarTemp", "0", "°C");
            setValue("humidity", "0", "%");
            setValue("sunPercent", "0", "%");
            setValue("luxValue", "0", "lx");
          });
      }

      function setValue(id, value, unit) {
        document.getElementById(id).innerHTML =
          value + ' <span class="unit">' + unit + "</span>";
      }

      function colorOutsideTemp(val) {
        let el = document.getElementById("outsideTemp");
        el.style.color = "#FF7859";
      }

      function colorSolarTemp(val) {
        let el = document.getElementById("solarTemp");
        el.style.color = "#CF91FF";
      }

      function colorHumidity(val) {
        let el = document.getElementById("humidity");
        el.style.color = "#91A2FF";
      }

      function colorSun(val) {
        let el = document.getElementById("sunPercent");
        el.style.color = "#ffcc00";
      }

      function colorLux(val) {
        let el = document.getElementById("luxValue");
        el.style.color = "#6DD3FC";
      }

      // Run immediately
      updateDashboard();

      // Update every 2 seconds
      setInterval(updateDashboard, 2000);

      function updateDateTime() {
        const now = new Date();

        const options = {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false, // change to true if you want 12H format
        };

        document.getElementById("dateTime").innerText = now.toLocaleString(
          "en-IN",
          options,
        );
      }

      updateDateTime();
      setInterval(updateDateTime, 1000); // update every second

      function openSetup() {
        window.location.href = "config.html";
      }
    </script>
    <div class="setup-btn" onclick="openSetup()">⚙️</div>
  </body>
</html>
