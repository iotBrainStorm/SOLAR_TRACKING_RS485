<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Monitor Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="dashboard.svg" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
      }

      .container {
        flex: 1; /* pushes footer down */
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeSlide 1s ease forwards;
      }

      .main-title {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Minimal smooth animation */
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .dashboard {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Centers each row */
        gap: 25px;
      }

      .card {
        flex: 0 0 300px;
        max-width: 300px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .icon {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        margin-bottom: 12px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ffffff, #cfd9df);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
      }

      /* Elegant underline */
      .title::after {
        content: "";
        display: block;
        width: 40px;
        height: 2px;
        margin: 8px auto 0;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        border-radius: 2px;
        opacity: 0.8;
      }

      .value {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .unit {
        font-size: 16px;
        opacity: 0.7;
      }

      .footer {
        text-align: center;
        margin-top: 100px;
        padding: 15px 10px;
        font-size: 13px;
        opacity: 0.7;
      }
      /* Floating Setup Button */
      .setup-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .setup-btn:hover {
        transform: scale(1.1) rotate(20deg);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      /* Sun Map Card */
      .sun-map-card {
        flex: 0 0 100%;
        max-width: 630px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px 25px 15px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .sun-map-card:hover {
        transform: translateY(-5px);
      }

      .sun-arc-container {
        position: relative;
        width: 100%;
        height: 140px;
        margin: 10px 0 5px;
        overflow: hidden;
      }

      .sun-arc-svg {
        width: 100%;
        height: 100%;
      }

      .sun-times {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        padding: 0 10px;
        margin-top: 2px;
      }

      .sun-times .sun-label {
        font-size: 11px;
        opacity: 0.6;
        display: block;
      }

      .sun-times .sun-time {
        font-size: 16px;
        font-weight: 600;
      }

      .sun-status {
        margin-top: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 class="main-title">Solar Monitoring Dashboard</h1>
        <div class="subtitle">Real-Time Device Analytics</div>
      </div>

      <div class="dashboard">
        <div class="card">
          <div class="icon">🌡️</div>
          <div class="title">Outside Temperature</div>
          <div class="value" id="outsideTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">🔥</div>
          <div class="title">Solar Plate Temperature</div>
          <div class="value" id="solarTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">💧</div>
          <div class="title">Humidity</div>
          <div class="value" id="humidity">-- <span class="unit">%</span></div>
        </div>

        <!-- Sun Map -->
        <div class="sun-map-card">
          <div class="title">Sun Map</div>
          <div class="sun-arc-container">
            <svg
              class="sun-arc-svg"
              viewBox="0 0 300 130"
              preserveAspectRatio="xMidYMid meet"
            >
              <!-- Horizon line -->
              <line
                x1="20"
                y1="120"
                x2="280"
                y2="120"
                stroke="rgba(255,255,255,0.2)"
                stroke-width="1"
                stroke-dasharray="4,4"
              />
              <!-- Arc path (dashed, below horizon hidden) -->
              <path
                id="sunArc"
                d="M 20 120 Q 150 -10 280 120"
                fill="none"
                stroke="rgba(255,255,255,0.15)"
                stroke-width="1.5"
                stroke-dasharray="3,3"
              />
              <!-- Traveled arc (colored) -->
              <path
                id="sunArcActive"
                d="M 20 120 Q 150 -10 280 120"
                fill="none"
                stroke="#ffcc00"
                stroke-width="2"
                stroke-dasharray="0"
                opacity="0.5"
              />
              <!-- Sun icon -->
              <circle
                id="sunDot"
                cx="20"
                cy="120"
                r="10"
                fill="#ffcc00"
                opacity="0.9"
              />
              <circle
                id="sunGlow"
                cx="20"
                cy="120"
                r="16"
                fill="#ffcc00"
                opacity="0.15"
              />
            </svg>
          </div>
          <div class="sun-times">
            <div>
              <span class="sun-label">Sunrise</span>
              <span class="sun-time" id="sunriseTime">--:--</span>
            </div>
            <div>
              <span class="sun-label">Sunset</span>
              <span class="sun-time" id="sunsetTime">--:--</span>
            </div>
          </div>
          <div class="sun-status" id="sunStatus"></div>
        </div>

        <div class="card">
          <div class="icon">🌞</div>
          <div class="title">Sunlight</div>
          <div class="value" id="sunPercent">
            -- <span class="unit">%</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">💡</div>
          <div class="title">Lux</div>
          <div class="value" id="luxValue">-- <span class="unit">lx</span></div>
        </div>
      </div>

      <div class="footer">
        <div style="margin-bottom: 8px">
          <span id="dateTime"></span>
        </div>
        <div>ESP32 Real-time Solar Monitor Dashboard | Developer © M.Maity</div>
      </div>
    </div>

    <script>
      function random(min, max, decimals = 1) {
        return (Math.random() * (max - min) + min).toFixed(decimals);
      }

      function updateDashboard() {
        fetch("/sensor.json")
          .then((res) => {
            if (!res.ok) throw new Error("No response");
            return res.json();
          })
          .then((data) => {
            let outside = parseFloat(data.ahtTemp) || 0;
            let solar = parseFloat(data.ntcTemp) || 0;
            let hum = parseFloat(data.humidity) || 0;
            let sunPercent = parseFloat(data.sunlight) || 0;
            let lux = parseFloat(data.lux) || 0;

            let tPrec =
              data.tempPrecision !== undefined ? data.tempPrecision : 2;
            let hPrec = data.humPrecision !== undefined ? data.humPrecision : 2;

            setValue("outsideTemp", outside.toFixed(tPrec), "°C");
            setValue("solarTemp", solar.toFixed(tPrec), "°C");
            setValue("humidity", hum.toFixed(hPrec), "%");
            setValue("sunPercent", sunPercent.toFixed(0), "%");
            setValue("luxValue", lux.toFixed(0), "lx");

            colorOutsideTemp(outside);
            colorSolarTemp(solar);
            colorHumidity(hum);
            colorSun(sunPercent);
            colorLux(lux);

            // Sun Map update
            updateSunMap(
              data.sunrise,
              data.sunset,
              data.sunriseMin,
              data.sunsetMin,
            );
          })
          .catch(() => {
            // If request fails → show zero values
            setValue("outsideTemp", "0", "°C");
            setValue("solarTemp", "0", "°C");
            setValue("humidity", "0", "%");
            setValue("sunPercent", "0", "%");
            setValue("luxValue", "0", "lx");
          });
      }

      function setValue(id, value, unit) {
        document.getElementById(id).innerHTML =
          value + ' <span class="unit">' + unit + "</span>";
      }

      function colorOutsideTemp(val) {
        let el = document.getElementById("outsideTemp");
        el.style.color = "#FF7859";
      }

      function colorSolarTemp(val) {
        let el = document.getElementById("solarTemp");
        el.style.color = "#CF91FF";
      }

      function colorHumidity(val) {
        let el = document.getElementById("humidity");
        el.style.color = "#91A2FF";
      }

      function colorSun(val) {
        let el = document.getElementById("sunPercent");
        el.style.color = "#ffcc00";
      }

      function colorLux(val) {
        let el = document.getElementById("luxValue");
        el.style.color = "#6DD3FC";
      }

      // Run immediately
      updateDashboard();

      // Update every 2 seconds
      setInterval(updateDashboard, 2000);

      function updateDateTime() {
        const now = new Date();

        const options = {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false, // change to true if you want 12H format
        };

        document.getElementById("dateTime").innerText = now.toLocaleString(
          "en-IN",
          options,
        );
      }

      updateDateTime();
      setInterval(updateDateTime, 1000); // update every second

      function openSetup() {
        window.location.href = "config.html";
      }

      function updateSunMap(sunriseStr, sunsetStr, sunriseMin, sunsetMin) {
        document.getElementById("sunriseTime").textContent =
          sunriseStr || "--:--";
        document.getElementById("sunsetTime").textContent =
          sunsetStr || "--:--";

        if (!sunriseMin || !sunsetMin || sunsetMin <= sunriseMin) {
          document.getElementById("sunStatus").textContent = "No sun data";
          return;
        }

        var now = new Date();
        var nowMin = now.getHours() * 60 + now.getMinutes();
        var totalDay = sunsetMin - sunriseMin;
        var progress = (nowMin - sunriseMin) / totalDay;

        var statusEl = document.getElementById("sunStatus");
        var sunDot = document.getElementById("sunDot");
        var sunGlow = document.getElementById("sunGlow");
        var arcActive = document.getElementById("sunArcActive");

        if (nowMin < sunriseMin) {
          var minsLeft = sunriseMin - nowMin;
          statusEl.textContent =
            "Sunrise in " +
            Math.floor(minsLeft / 60) +
            "h " +
            (minsLeft % 60) +
            "m";
          progress = 0;
        } else if (nowMin > sunsetMin) {
          statusEl.textContent = "Sun has set";
          progress = 1;
        } else {
          var minsLeft = sunsetMin - nowMin;
          statusEl.textContent =
            "Sunset in " +
            Math.floor(minsLeft / 60) +
            "h " +
            (minsLeft % 60) +
            "m";
        }

        progress = Math.max(0, Math.min(1, progress));

        // Quadratic bezier: P0(20,120) CP(150,-10) P1(280,120)
        var t = progress;
        var x = (1 - t) * (1 - t) * 20 + 2 * (1 - t) * t * 150 + t * t * 280;
        var y = (1 - t) * (1 - t) * 120 + 2 * (1 - t) * t * -10 + t * t * 120;

        sunDot.setAttribute("cx", x);
        sunDot.setAttribute("cy", y);
        sunGlow.setAttribute("cx", x);
        sunGlow.setAttribute("cy", y);

        // Partial arc up to current position
        if (progress > 0 && progress < 1) {
          var pathD = "M 20 120";
          var steps = Math.round(t * 50);
          for (var i = 1; i <= steps; i++) {
            var st = i / 50;
            var sx =
              (1 - st) * (1 - st) * 20 +
              2 * (1 - st) * st * 150 +
              st * st * 280;
            var sy =
              (1 - st) * (1 - st) * 120 +
              2 * (1 - st) * st * -10 +
              st * st * 120;
            pathD += " L " + sx.toFixed(1) + " " + sy.toFixed(1);
          }
          arcActive.setAttribute("d", pathD);
          arcActive.setAttribute("opacity", "0.6");
          sunDot.setAttribute("opacity", "0.95");
          sunGlow.setAttribute("opacity", "0.2");
        } else if (progress >= 1) {
          arcActive.setAttribute("d", "M 20 120 Q 150 -10 280 120");
          arcActive.setAttribute("opacity", "0.2");
          sunDot.setAttribute("opacity", "0.3");
          sunGlow.setAttribute("opacity", "0.05");
        } else {
          arcActive.setAttribute("d", "M 0 0");
          arcActive.setAttribute("opacity", "0");
          sunDot.setAttribute("opacity", "0.4");
          sunGlow.setAttribute("opacity", "0.08");
        }
      }
    </script>
    <div class="setup-btn" onclick="openSetup()">⚙️</div>
  </body>
</html>
