<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Monitor Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="dashboard.svg" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
      }

      .container {
        flex: 1; /* pushes footer down */
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeSlide 1s ease forwards;
      }

      .main-title {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Minimal smooth animation */
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .dashboard {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Centers each row */
        gap: 25px;
      }

      .card {
        flex: 0 0 300px;
        max-width: 300px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card-sub {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .card-sub .sub-icon {
        font-size: 16px;
      }

      .card-sub .sub-value {
        font-size: 18px;
        font-weight: 600;
        color: #91a2ff;
      }

      .card-sub .sub-unit {
        font-size: 12px;
        opacity: 0.6;
      }

      .icon {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        margin-bottom: 12px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ffffff, #cfd9df);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
      }

      /* Elegant underline */
      .title::after {
        content: "";
        display: block;
        width: 40px;
        height: 2px;
        margin: 8px auto 0;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        border-radius: 2px;
        opacity: 0.8;
      }

      .value {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .unit {
        font-size: 16px;
        opacity: 0.7;
      }

      .footer {
        text-align: center;
        margin-top: 100px;
        padding: 15px 10px;
        font-size: 13px;
        opacity: 0.7;
      }
      /* Settings Button (top right) */
      .setup-btn {
        position: fixed;
        top: 18px;
        right: 20px;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        transition: color 0.3s ease;
        z-index: 1000;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      .setup-btn:hover {
        color: #4facfe;
      }

      .setup-btn:active {
        color: #00f2fe;
        box-shadow: none;
        outline: none;
      }

      .setup-btn svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }

      /* Sun Map Card */
      .sun-map-card {
        flex: 0 0 100%;
        max-width: 630px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px 25px 15px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .sun-map-card:hover {
        transform: translateY(-5px);
      }

      .sun-arc-container {
        position: relative;
        width: 100%;
        height: 170px;
        margin: 10px 0 5px;
        overflow: hidden;
      }

      .sun-arc-svg {
        width: 100%;
        height: 100%;
      }

      .sun-times {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        padding: 0 10px;
        margin-top: 2px;
      }

      .sun-times .sun-label {
        font-size: 11px;
        opacity: 0.6;
        display: block;
      }

      .sun-times .sun-time {
        font-size: 16px;
        font-weight: 600;
      }

      /* Sun glow pulse animation */
      @keyframes sunPulse {
        0%,
        100% {
          r: 16;
          opacity: 0.15;
        }
        50% {
          r: 22;
          opacity: 0.25;
        }
      }

      @keyframes sunPulseOuter {
        0%,
        100% {
          r: 26;
          opacity: 0.06;
        }
        50% {
          r: 32;
          opacity: 0.12;
        }
      }

      #sunGlow {
        animation: sunPulse 2s ease-in-out infinite;
      }

      #sunGlowOuter {
        animation: sunPulseOuter 2.5s ease-in-out infinite;
      }

      .sun-glow-off #sunGlow,
      .sun-glow-off #sunGlowOuter {
        animation: none;
      }

      /* Sun stats row */
      .sun-stats {
        display: flex;
        justify-content: space-around;
        margin-top: 12px;
        padding: 10px 5px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
      }

      .sun-stat-item {
        text-align: center;
        flex: 1;
      }

      .sun-stat-item .stat-value {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .sun-stat-item .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.5;
        margin-top: 2px;
      }

      .sun-stat-divider {
        width: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 2px 0;
      }

      /* Responsive: Tablet */
      @media (max-width: 768px) {
        .container {
          padding: 15px 12px;
        }

        .header {
          margin-bottom: 25px;
        }

        .main-title {
          font-size: 28px;
        }

        .subtitle {
          font-size: 12px;
          letter-spacing: 1.5px;
        }

        .dashboard {
          gap: 16px;
        }

        .card {
          flex: 1 1 calc(50% - 10px);
          max-width: calc(50% - 10px);
          min-width: 200px;
          padding: 20px;
        }

        .icon {
          font-size: 34px;
          margin-bottom: 10px;
        }

        .value {
          font-size: 30px;
        }

        .card-sub .sub-value {
          font-size: 16px;
        }

        .sun-map-card {
          flex: 0 0 100%;
          max-width: 100%;
          padding: 20px 16px 12px;
        }

        .sun-arc-container {
          height: 155px;
        }

        .sun-times {
          padding: 0 8px;
        }

        .sun-times .sun-time {
          font-size: 15px;
        }

        .sun-stats {
          padding: 10px 8px;
        }

        .sun-stat-item .stat-value {
          font-size: 17px;
        }

        .sun-stat-item .stat-label {
          font-size: 9px;
          letter-spacing: 0.8px;
        }

        .setup-btn {
          top: 14px;
          right: 14px;
          width: 38px;
          height: 38px;
        }

        .setup-btn svg {
          width: 20px;
          height: 20px;
        }

        .footer {
          margin-top: 50px;
          font-size: 11px;
        }
      }

      /* Responsive: Mobile */
      @media (max-width: 480px) {
        .container {
          padding: 12px 8px;
        }

        .header {
          margin-bottom: 18px;
        }

        .main-title {
          font-size: 20px;
        }

        .subtitle {
          font-size: 10px;
          letter-spacing: 1px;
        }

        .dashboard {
          gap: 12px;
        }

        .card {
          flex: 0 0 100%;
          max-width: 100%;
          padding: 16px;
          border-radius: 14px;
        }

        .icon {
          font-size: 28px;
          margin-bottom: 8px;
        }

        .title {
          font-size: 13px;
          margin-bottom: 8px;
        }

        .value {
          font-size: 26px;
        }

        .unit {
          font-size: 13px;
        }

        .sun-map-card {
          padding: 14px 10px 10px;
          border-radius: 14px;
        }

        .sun-arc-container {
          height: 130px;
        }

        .sun-times .sun-time {
          font-size: 14px;
        }

        .sun-times .sun-label {
          font-size: 10px;
        }

        .sun-stats {
          padding: 8px 3px;
          gap: 2px;
        }

        .sun-stat-item .stat-value {
          font-size: 14px;
        }

        .sun-stat-item .stat-label {
          font-size: 8px;
          letter-spacing: 0.5px;
        }

        .setup-btn {
          top: 12px;
          right: 12px;
          width: 36px;
          height: 36px;
          border-radius: 10px;
        }

        .setup-btn svg {
          width: 18px;
          height: 18px;
        }

        .footer {
          margin-top: 35px;
          font-size: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 class="main-title">Solar Monitoring Dashboard</h1>
        <div class="subtitle">Real-Time Device Analytics</div>
      </div>

      <div class="dashboard">
        <div class="card">
          <div class="icon">🌡️</div>
          <div class="title">Outside Temperature</div>
          <div class="value" id="outsideTemp">
            -- <span class="unit">°C</span>
          </div>
          <div class="card-sub">
            <span class="sub-icon">💧</span>
            <span class="sub-value" id="humidity">--</span>
            <span class="sub-unit">%</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">🔥</div>
          <div class="title">Solar Plate Temperature</div>
          <div class="value" id="solarTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <!-- Sun Map -->
        <div class="sun-map-card">
          <div class="title">Sun Map</div>
          <div class="sun-arc-container">
            <svg
              class="sun-arc-svg"
              viewBox="0 0 300 150"
              preserveAspectRatio="xMidYMid meet"
            >
              <defs>
                <radialGradient id="sunGlowGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.6" />
                  <stop offset="100%" stop-color="#ffcc00" stop-opacity="0" />
                </radialGradient>
              </defs>
              <!-- Azimuth direction label (top left) -->
              <text
                id="azimuthLabel"
                x="5"
                y="14"
                fill="rgba(255,255,255,0.5)"
                font-size="11"
                font-family="Segoe UI, sans-serif"
                font-weight="600"
                letter-spacing="0.5"
              >
                --
              </text>
              <!-- Mini compass with plus shape (top right) -->
              <g id="compassGroup" transform="translate(272,26)">
                <circle
                  cx="0"
                  cy="0"
                  r="24"
                  fill="rgba(255,255,255,0.04)"
                  stroke="rgba(255,255,255,0.12)"
                  stroke-width="0.5"
                />
                <!-- Plus crosshair lines -->
                <line
                  x1="0"
                  y1="-24"
                  x2="0"
                  y2="24"
                  stroke="rgba(255,255,255,0.08)"
                  stroke-width="0.5"
                />
                <line
                  x1="-24"
                  y1="0"
                  x2="24"
                  y2="0"
                  stroke="rgba(255,255,255,0.08)"
                  stroke-width="0.5"
                />
                <!-- N E S W at plus terminals -->
                <text
                  x="0"
                  y="-14"
                  text-anchor="middle"
                  fill="rgba(255,100,100,0.7)"
                  font-size="7"
                  font-family="Segoe UI, sans-serif"
                  font-weight="700"
                >
                  N
                </text>
                <text
                  x="0"
                  y="20"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.3)"
                  font-size="7"
                  font-family="Segoe UI, sans-serif"
                >
                  S
                </text>
                <text
                  x="16"
                  y="3"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.3)"
                  font-size="7"
                  font-family="Segoe UI, sans-serif"
                >
                  E
                </text>
                <text
                  x="-16"
                  y="3"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.3)"
                  font-size="7"
                  font-family="Segoe UI, sans-serif"
                >
                  W
                </text>
                <!-- Sun position dot -->
                <circle
                  id="compassDot"
                  cx="0"
                  cy="0"
                  r="2.5"
                  fill="#ffcc00"
                  opacity="0.85"
                />
              </g>
              <!-- Optimal sunlight zone (light red fill between 45° diagonal axes) -->
              <path
                d="M 150 140 L 82 72 L 98 64 L 114 58 L 130 54 L 143 52 L 150 51.5 L 157 52 L 170 54 L 186 58 L 202 64 L 218 72 L 150 140 Z"
                fill="rgba(255,70,70,0.06)"
              />
              <!-- Horizon line (solid) -->
              <line
                x1="15"
                y1="140"
                x2="285"
                y2="140"
                stroke="rgba(255,255,255,0.2)"
                stroke-width="1"
              />
              <!-- Left 45° diagonal dotted axis (from center to arc) -->
              <line
                x1="150"
                y1="140"
                x2="82"
                y2="72"
                stroke="rgba(255,120,120,0.25)"
                stroke-width="1"
                stroke-dasharray="3,4"
              />
              <!-- Right 45° diagonal dotted axis (from center to arc) -->
              <line
                x1="150"
                y1="140"
                x2="218"
                y2="72"
                stroke="rgba(255,120,120,0.25)"
                stroke-width="1"
                stroke-dasharray="3,4"
              />
              <!-- Left 45° time label (rotated along line direction) -->
              <text
                id="time45Left"
                x="116"
                y="106"
                text-anchor="middle"
                fill="rgba(255,255,255,0.45)"
                font-size="8"
                font-family="Segoe UI, sans-serif"
                transform="rotate(45, 116, 106)"
              >
                --:--
              </text>
              <!-- Right 45° time label (rotated along line direction) -->
              <text
                id="time45Right"
                x="184"
                y="106"
                text-anchor="middle"
                fill="rgba(255,255,255,0.45)"
                font-size="8"
                font-family="Segoe UI, sans-serif"
                transform="rotate(-45, 184, 106)"
              >
                --:--
              </text>
              <!-- Solar Noon vertical dotted axis -->
              <line
                x1="150"
                y1="140"
                x2="150"
                y2="10"
                stroke="rgba(255,255,255,0.15)"
                stroke-width="1"
                stroke-dasharray="3,4"
              />
              <!-- Arc path (dashed) -->
              <path
                id="sunArc"
                d="M 15 140 Q 150 -40 285 140"
                fill="none"
                stroke="rgba(255,255,255,0.15)"
                stroke-width="1.5"
                stroke-dasharray="3,3"
              />
              <!-- Traveled arc (colored) -->
              <path
                id="sunArcActive"
                d="M 15 140 Q 150 -40 285 140"
                fill="none"
                stroke="#ffcc00"
                stroke-width="2"
                stroke-dasharray="0"
                opacity="0.5"
              />
              <!-- Outer glow -->
              <circle
                id="sunGlowOuter"
                cx="15"
                cy="140"
                r="26"
                fill="url(#sunGlowGrad)"
                opacity="0.06"
              />
              <!-- Inner glow -->
              <circle
                id="sunGlow"
                cx="15"
                cy="140"
                r="16"
                fill="#ffcc00"
                opacity="0.15"
              />
              <!-- Sun dot -->
              <circle
                id="sunDot"
                cx="15"
                cy="140"
                r="8"
                fill="#ffcc00"
                opacity="0.9"
              />
            </svg>
          </div>
          <div class="sun-times">
            <div>
              <span class="sun-label">Sunrise</span>
              <span class="sun-time" id="sunriseTime">--:--</span>
            </div>
            <div style="text-align: center">
              <span class="sun-label">Solar Noon</span>
              <span class="sun-time" id="solarNoonTime">--:--</span>
            </div>
            <div style="text-align: right">
              <span class="sun-label">Sunset</span>
              <span class="sun-time" id="sunsetTime">--:--</span>
            </div>
          </div>
          <!-- Stats row -->
          <div class="sun-stats">
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapAngle" style="color: #ff9f43">
                --°
              </div>
              <div class="stat-label">Sun Angle</div>
            </div>
            <div class="sun-stat-divider"></div>
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapPercent" style="color: #ffcc00">
                --%
              </div>
              <div class="stat-label">Sunlight</div>
            </div>
            <div class="sun-stat-divider"></div>
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapLux" style="color: #6dd3fc">
                -- lx
              </div>
              <div class="stat-label">Lux</div>
            </div>
            <div class="sun-stat-divider"></div>
            <div class="sun-stat-item">
              <div class="stat-value" id="sunRemaining" style="color: #a29bfe">
                --
              </div>
              <div class="stat-label">Remaining</div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div style="margin-bottom: 8px">
          <span id="dateTime"></span>
        </div>
        <div>ESP32 Real-time Solar Monitor Dashboard | Developer © M.Maity</div>
      </div>
    </div>

    <script>
      function random(min, max, decimals = 1) {
        return (Math.random() * (max - min) + min).toFixed(decimals);
      }

      function updateDashboard() {
        fetch("/sensor.json")
          .then((res) => {
            if (!res.ok) throw new Error("No response");
            return res.json();
          })
          .then((data) => {
            let outside = parseFloat(data.ahtTemp) || 0;
            let solar = parseFloat(data.ntcTemp) || 0;
            let hum = parseFloat(data.humidity) || 0;
            let sunPercent = parseFloat(data.sunlight) || 0;
            let lux = parseFloat(data.lux) || 0;

            let tPrec =
              data.tempPrecision !== undefined ? data.tempPrecision : 2;
            let hPrec = data.humPrecision !== undefined ? data.humPrecision : 2;

            setValue("outsideTemp", outside.toFixed(tPrec), "°C");
            setValue("solarTemp", solar.toFixed(tPrec), "°C");
            document.getElementById("humidity").textContent =
              hum.toFixed(hPrec);

            colorOutsideTemp(outside);
            colorSolarTemp(solar);

            // Sun Map update
            var lat = parseFloat(data.latitude) || 0;
            var lon = parseFloat(data.longitude) || 0;
            var tz = parseFloat(data.tzOffset) || 5.5;

            updateSunMap(
              data.sunrise,
              data.sunset,
              data.sunriseMin,
              data.sunsetMin,
              sunPercent,
              lux,
              lat,
              lon,
              tz,
            );
          })
          .catch(() => {
            // If request fails → show zero values
            setValue("outsideTemp", "0", "°C");
            setValue("solarTemp", "0", "°C");
            document.getElementById("humidity").textContent = "0";
          });
      }

      function setValue(id, value, unit) {
        document.getElementById(id).innerHTML =
          value + ' <span class="unit">' + unit + "</span>";
      }

      function colorOutsideTemp(val) {
        let el = document.getElementById("outsideTemp");
        el.style.color = "#FF7859";
      }

      function colorSolarTemp(val) {
        let el = document.getElementById("solarTemp");
        el.style.color = "#CF91FF";
      }

      // Run immediately
      updateDashboard();

      // Update every 2 seconds
      setInterval(updateDashboard, 2000);

      function updateDateTime() {
        const now = new Date();

        const options = {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false, // change to true if you want 12H format
        };

        document.getElementById("dateTime").innerText = now.toLocaleString(
          "en-IN",
          options,
        );
      }

      updateDateTime();
      setInterval(updateDateTime, 1000); // update every second

      function openSetup() {
        window.location.href = "config.html";
      }

      // --- Real astronomical sun position calculation ---
      function calcSunPosition(lat, lon, tz, dateObj) {
        var yr = dateObj.getFullYear();
        var start = new Date(yr, 0, 0);
        var diff = dateObj - start;
        var oneDay = 86400000;
        var dayOfYear = Math.floor(diff / oneDay);
        var hour =
          dateObj.getHours() +
          dateObj.getMinutes() / 60.0 +
          dateObj.getSeconds() / 3600.0;

        var gamma =
          ((2.0 * Math.PI) / 365.0) * (dayOfYear - 1 + (hour - 12) / 24.0);

        // Equation of time (minutes)
        var eqTime =
          229.18 *
          (0.000075 +
            0.001868 * Math.cos(gamma) -
            0.032077 * Math.sin(gamma) -
            0.014615 * Math.cos(2 * gamma) -
            0.040849 * Math.sin(2 * gamma));

        // Solar declination (radians)
        var decl =
          0.006918 -
          0.399912 * Math.cos(gamma) +
          0.070257 * Math.sin(gamma) -
          0.006758 * Math.cos(2 * gamma) +
          0.000907 * Math.sin(2 * gamma) -
          0.002697 * Math.cos(3 * gamma) +
          0.00148 * Math.sin(3 * gamma);

        // Time offset (minutes)
        var timeOffset = eqTime + 4 * lon - 60 * tz;

        // True solar time (minutes)
        var tst =
          dateObj.getHours() * 60 +
          dateObj.getMinutes() +
          dateObj.getSeconds() / 60.0 +
          timeOffset;

        // Hour angle (degrees)
        var ha = tst / 4.0 - 180.0;

        var haRad = (ha * Math.PI) / 180.0;
        var latRad = (lat * Math.PI) / 180.0;

        // Solar zenith angle
        var cosZenith =
          Math.sin(latRad) * Math.sin(decl) +
          Math.cos(latRad) * Math.cos(decl) * Math.cos(haRad);
        cosZenith = Math.max(-1, Math.min(1, cosZenith));
        var zenith = Math.acos(cosZenith);
        var elevation = 90.0 - (zenith * 180.0) / Math.PI;

        // Azimuth calculation
        var azimuth =
          (Math.atan2(
            Math.sin(haRad),
            Math.cos(haRad) * Math.sin(latRad) -
              Math.tan(decl) * Math.cos(latRad),
          ) *
            180.0) /
          Math.PI;
        azimuth = azimuth + 180.0; // Convert to compass bearing (0=N)

        return { elevation: elevation, azimuth: azimuth };
      }

      function azimuthToDir(az) {
        var dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        var idx = Math.round(az / 45) % 8;
        return dirs[idx];
      }

      // Find the time (in minutes from midnight) when sun elevation crosses a target angle
      // direction: 'rising' for morning, 'setting' for afternoon
      function findAngleCrossingTime(
        lat,
        lon,
        tz,
        targetAngle,
        sunriseMin,
        sunsetMin,
        direction,
      ) {
        var today = new Date();
        var yr = today.getFullYear();
        var mo = today.getMonth();
        var dy = today.getDate();
        var startMin, endMin;
        var noonMin = Math.round((sunriseMin + sunsetMin) / 2);
        if (direction === "rising") {
          startMin = sunriseMin;
          endMin = noonMin;
        } else {
          startMin = noonMin;
          endMin = sunsetMin;
        }
        // Binary search for crossing time
        for (var i = 0; i < 20; i++) {
          var midMin = Math.round((startMin + endMin) / 2);
          var d = new Date(yr, mo, dy, Math.floor(midMin / 60), midMin % 60, 0);
          var elev = calcSunPosition(lat, lon, tz, d).elevation;
          if (elev < targetAngle) {
            if (direction === "rising") startMin = midMin;
            else endMin = midMin;
          } else {
            if (direction === "rising") endMin = midMin;
            else startMin = midMin;
          }
        }
        return Math.round((startMin + endMin) / 2);
      }

      function formatMin(m) {
        var h = Math.floor(m / 60);
        var mm = m % 60;
        return (h < 10 ? "0" : "") + h + ":" + (mm < 10 ? "0" : "") + mm;
      }

      function updateSunMap(
        sunriseStr,
        sunsetStr,
        sunriseMin,
        sunsetMin,
        sunPercent,
        lux,
        lat,
        lon,
        tz,
      ) {
        document.getElementById("sunriseTime").textContent =
          sunriseStr || "--:--";
        document.getElementById("sunsetTime").textContent =
          sunsetStr || "--:--";

        // Calculate and display Solar Noon + 45° times using real formula
        if (sunriseMin && sunsetMin && sunsetMin > sunriseMin) {
          var noonMin = Math.round((sunriseMin + sunsetMin) / 2);
          document.getElementById("solarNoonTime").textContent =
            formatMin(noonMin);

          // Check if sun ever reaches 45° today
          var today = new Date();
          var noonDate = new Date(
            today.getFullYear(),
            today.getMonth(),
            today.getDate(),
            Math.floor(noonMin / 60),
            noonMin % 60,
            0,
          );
          var maxElev = calcSunPosition(lat, lon, tz, noonDate).elevation;

          if (maxElev >= 45) {
            var left45 = findAngleCrossingTime(
              lat,
              lon,
              tz,
              45,
              sunriseMin,
              sunsetMin,
              "rising",
            );
            var right45 = findAngleCrossingTime(
              lat,
              lon,
              tz,
              45,
              sunriseMin,
              sunsetMin,
              "setting",
            );
            document.getElementById("time45Left").textContent =
              formatMin(left45);
            document.getElementById("time45Right").textContent =
              formatMin(right45);
          } else {
            document.getElementById("time45Left").textContent = "--:--";
            document.getElementById("time45Right").textContent = "--:--";
          }
        } else {
          document.getElementById("solarNoonTime").textContent = "--:--";
          document.getElementById("time45Left").textContent = "--:--";
          document.getElementById("time45Right").textContent = "--:--";
        }

        var svgEl = document.querySelector(".sun-arc-svg");

        // Update stats
        document.getElementById("sunMapPercent").textContent =
          sunPercent != null ? Math.round(sunPercent) + "%" : "--%";
        document.getElementById("sunMapLux").textContent =
          lux != null ? Math.round(lux) + " lx" : "-- lx";

        if (!sunriseMin || !sunsetMin || sunsetMin <= sunriseMin) {
          document.getElementById("sunRemaining").textContent = "--";
          document.getElementById("sunMapAngle").textContent = "--°";
          return;
        }

        var now = new Date();
        var nowMin = now.getHours() * 60 + now.getMinutes();
        var totalDay = sunsetMin - sunriseMin;
        var progress = (nowMin - sunriseMin) / totalDay;

        var sunDot = document.getElementById("sunDot");
        var sunGlow = document.getElementById("sunGlow");
        var sunGlowOuter = document.getElementById("sunGlowOuter");
        var arcActive = document.getElementById("sunArcActive");
        var remainEl = document.getElementById("sunRemaining");

        if (nowMin < sunriseMin) {
          var minsLeft = sunriseMin - nowMin;
          remainEl.textContent =
            Math.floor(minsLeft / 60) + "h " + (minsLeft % 60) + "m";
          progress = 0;
        } else if (nowMin > sunsetMin) {
          remainEl.textContent = "Set";
          progress = 1;
        } else {
          var minsLeft = sunsetMin - nowMin;
          remainEl.textContent =
            Math.floor(minsLeft / 60) + "h " + (minsLeft % 60) + "m";
        }

        // Real sun position from astronomical formula
        var sunPos = calcSunPosition(lat, lon, tz, now);
        var sunAngle = sunPos.elevation;
        var sunAzimuth = sunPos.azimuth;
        if (sunAngle < 0) sunAngle = 0;
        document.getElementById("sunMapAngle").textContent =
          Math.round(sunAngle) + "°";

        // Update azimuth label (top left)
        var dirStr = azimuthToDir(sunAzimuth);
        document.getElementById("azimuthLabel").textContent =
          dirStr + " " + Math.round(sunAzimuth) + "°";

        // Update compass dot (top right)
        var azRad = (sunAzimuth * Math.PI) / 180.0;
        var cR = 11;
        var cdx = cR * Math.sin(azRad);
        var cdy = -cR * Math.cos(azRad);
        document
          .getElementById("compassDot")
          .setAttribute("cx", cdx.toFixed(1));
        document
          .getElementById("compassDot")
          .setAttribute("cy", cdy.toFixed(1));

        progress = Math.max(0, Math.min(1, progress));

        // Quadratic bezier: P0(15,140) CP(150,-40) P1(285,140)
        var t = progress;
        var x = (1 - t) * (1 - t) * 15 + 2 * (1 - t) * t * 150 + t * t * 285;
        var y = (1 - t) * (1 - t) * 140 + 2 * (1 - t) * t * -40 + t * t * 140;

        sunDot.setAttribute("cx", x);
        sunDot.setAttribute("cy", y);
        sunGlow.setAttribute("cx", x);
        sunGlow.setAttribute("cy", y);
        sunGlowOuter.setAttribute("cx", x);
        sunGlowOuter.setAttribute("cy", y);

        // Partial arc up to current position
        if (progress > 0 && progress < 1) {
          var pathD = "M 15 140";
          var steps = Math.round(t * 50);
          for (var i = 1; i <= steps; i++) {
            var st = i / 50;
            var sx =
              (1 - st) * (1 - st) * 15 +
              2 * (1 - st) * st * 150 +
              st * st * 285;
            var sy =
              (1 - st) * (1 - st) * 140 +
              2 * (1 - st) * st * -40 +
              st * st * 140;
            pathD += " L " + sx.toFixed(1) + " " + sy.toFixed(1);
          }
          arcActive.setAttribute("d", pathD);
          arcActive.setAttribute("opacity", "0.6");
          sunDot.setAttribute("opacity", "0.95");
          sunGlow.setAttribute("opacity", "0.2");
          sunGlowOuter.setAttribute("opacity", "0.08");
          svgEl.classList.remove("sun-glow-off");
        } else if (progress >= 1) {
          arcActive.setAttribute("d", "M 15 140 Q 150 -40 285 140");
          arcActive.setAttribute("opacity", "0.2");
          sunDot.setAttribute("opacity", "0.3");
          sunGlow.setAttribute("opacity", "0.05");
          sunGlowOuter.setAttribute("opacity", "0");
          svgEl.classList.add("sun-glow-off");
        } else {
          arcActive.setAttribute("d", "M 0 0");
          arcActive.setAttribute("opacity", "0");
          sunDot.setAttribute("opacity", "0.4");
          sunGlow.setAttribute("opacity", "0.08");
          sunGlowOuter.setAttribute("opacity", "0");
          svgEl.classList.add("sun-glow-off");
        }
      }
    </script>
