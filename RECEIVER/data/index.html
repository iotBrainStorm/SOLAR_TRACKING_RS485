<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Monitor Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="dashboard.svg" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
      }

      .container {
        flex: 1; /* pushes footer down */
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeSlide 1s ease forwards;
      }

      .main-title {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(90deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* Minimal smooth animation */
      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header h1 {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .dashboard {
        display: flex;
        flex-wrap: wrap;
        justify-content: center; /* Centers each row */
        gap: 25px;
      }

      .card {
        flex: 0 0 300px;
        max-width: 300px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card-sub {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .card-sub .sub-icon {
        font-size: 16px;
      }

      .card-sub .sub-value {
        font-size: 18px;
        font-weight: 600;
        color: #91a2ff;
      }

      .card-sub .sub-unit {
        font-size: 12px;
        opacity: 0.6;
      }

      .icon {
        font-size: 40px;
        margin-bottom: 15px;
      }

      .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        margin-bottom: 12px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ffffff, #cfd9df);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
      }

      /* Elegant underline */
      .title::after {
        content: "";
        display: block;
        width: 40px;
        height: 2px;
        margin: 8px auto 0;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        border-radius: 2px;
        opacity: 0.8;
      }

      .value {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .unit {
        font-size: 16px;
        opacity: 0.7;
      }

      .footer {
        text-align: center;
        margin-top: 100px;
        padding: 15px 10px;
        font-size: 13px;
        opacity: 0.7;
      }
      /* Floating Setup Button */
      .setup-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: white;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .setup-btn:hover {
        transform: scale(1.1) rotate(20deg);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      /* Sun Map Card */
      .sun-map-card {
        flex: 0 0 100%;
        max-width: 630px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px 25px 15px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
      }

      .sun-map-card:hover {
        transform: translateY(-5px);
      }

      .sun-arc-container {
        position: relative;
        width: 100%;
        height: 140px;
        margin: 10px 0 5px;
        overflow: hidden;
      }

      .sun-arc-svg {
        width: 100%;
        height: 100%;
      }

      .sun-times {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        padding: 0 10px;
        margin-top: 2px;
      }

      .sun-times .sun-label {
        font-size: 11px;
        opacity: 0.6;
        display: block;
      }

      .sun-times .sun-time {
        font-size: 16px;
        font-weight: 600;
      }

      .sun-status {
        margin-top: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.6);
      }

      /* Sun glow pulse animation */
      @keyframes sunPulse {
        0%,
        100% {
          r: 16;
          opacity: 0.15;
        }
        50% {
          r: 22;
          opacity: 0.25;
        }
      }

      @keyframes sunPulseOuter {
        0%,
        100% {
          r: 26;
          opacity: 0.06;
        }
        50% {
          r: 32;
          opacity: 0.12;
        }
      }

      #sunGlow {
        animation: sunPulse 2s ease-in-out infinite;
      }

      #sunGlowOuter {
        animation: sunPulseOuter 2.5s ease-in-out infinite;
      }

      .sun-glow-off #sunGlow,
      .sun-glow-off #sunGlowOuter {
        animation: none;
      }

      /* Sun stats row */
      .sun-stats {
        display: flex;
        justify-content: space-around;
        margin-top: 12px;
        padding: 10px 5px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
      }

      .sun-stat-item {
        text-align: center;
        flex: 1;
      }

      .sun-stat-item .stat-value {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .sun-stat-item .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.5;
        margin-top: 2px;
      }

      .sun-stat-divider {
        width: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 2px 0;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1 class="main-title">Solar Monitoring Dashboard</h1>
        <div class="subtitle">Real-Time Device Analytics</div>
      </div>

      <div class="dashboard">
        <div class="card">
          <div class="icon">🌡️</div>
          <div class="title">Outside Temperature</div>
          <div class="value" id="outsideTemp">
            -- <span class="unit">°C</span>
          </div>
          <div class="card-sub">
            <span class="sub-icon">💧</span>
            <span class="sub-value" id="humidity">--</span>
            <span class="sub-unit">%</span>
          </div>
        </div>

        <div class="card">
          <div class="icon">🔥</div>
          <div class="title">Solar Plate Temperature</div>
          <div class="value" id="solarTemp">
            -- <span class="unit">°C</span>
          </div>
        </div>

        <!-- Sun Map -->
        <div class="sun-map-card">
          <div class="title">Sun Map</div>
          <div class="sun-arc-container">
            <svg
              class="sun-arc-svg"
              viewBox="0 0 300 130"
              preserveAspectRatio="xMidYMid meet"
            >
              <defs>
                <radialGradient id="sunGlowGrad" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.6" />
                  <stop offset="100%" stop-color="#ffcc00" stop-opacity="0" />
                </radialGradient>
              </defs>
              <!-- Horizon line (solid) -->
              <line
                x1="20"
                y1="120"
                x2="280"
                y2="120"
                stroke="rgba(255,255,255,0.2)"
                stroke-width="1"
              />
              <!-- Solar Noon vertical dotted axis -->
              <line
                x1="150"
                y1="120"
                x2="150"
                y2="15"
                stroke="rgba(255,255,255,0.15)"
                stroke-width="1"
                stroke-dasharray="3,4"
              />
              <!-- Arc path (dashed) -->
              <path
                id="sunArc"
                d="M 20 120 Q 150 -25 280 120"
                fill="none"
                stroke="rgba(255,255,255,0.15)"
                stroke-width="1.5"
                stroke-dasharray="3,3"
              />
              <!-- Traveled arc (colored) -->
              <path
                id="sunArcActive"
                d="M 20 120 Q 150 -25 280 120"
                fill="none"
                stroke="#ffcc00"
                stroke-width="2"
                stroke-dasharray="0"
                opacity="0.5"
              />
              <!-- Outer glow -->
              <circle
                id="sunGlowOuter"
                cx="20"
                cy="120"
                r="26"
                fill="url(#sunGlowGrad)"
                opacity="0.06"
              />
              <!-- Inner glow -->
              <circle
                id="sunGlow"
                cx="20"
                cy="120"
                r="16"
                fill="#ffcc00"
                opacity="0.15"
              />
              <!-- Sun dot -->
              <circle
                id="sunDot"
                cx="20"
                cy="120"
                r="8"
                fill="#ffcc00"
                opacity="0.9"
              />
            </svg>
          </div>
          <div class="sun-times">
            <div>
              <span class="sun-label">Sunrise</span>
              <span class="sun-time" id="sunriseTime">--:--</span>
            </div>
            <div style="text-align: center">
              <span class="sun-label">Solar Noon</span>
              <span class="sun-time" id="solarNoonTime">--:--</span>
            </div>
            <div style="text-align: right">
              <span class="sun-label">Sunset</span>
              <span class="sun-time" id="sunsetTime">--:--</span>
            </div>
          </div>
          <div class="sun-status" id="sunStatus"></div>

          <!-- Stats row -->
          <div class="sun-stats">
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapAngle" style="color: #ff9f43">
                --°
              </div>
              <div class="stat-label">Sun Angle</div>
            </div>
            <div class="sun-stat-divider"></div>
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapPercent" style="color: #ffcc00">
                --%
              </div>
              <div class="stat-label">Sunlight</div>
            </div>
            <div class="sun-stat-divider"></div>
            <div class="sun-stat-item">
              <div class="stat-value" id="sunMapLux" style="color: #6dd3fc">
                -- lx
              </div>
              <div class="stat-label">Lux</div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div style="margin-bottom: 8px">
          <span id="dateTime"></span>
        </div>
        <div>ESP32 Real-time Solar Monitor Dashboard | Developer © M.Maity</div>
      </div>
    </div>

    <script>
      function random(min, max, decimals = 1) {
        return (Math.random() * (max - min) + min).toFixed(decimals);
      }

      function updateDashboard() {
        fetch("/sensor.json")
          .then((res) => {
            if (!res.ok) throw new Error("No response");
            return res.json();
          })
          .then((data) => {
            let outside = parseFloat(data.ahtTemp) || 0;
            let solar = parseFloat(data.ntcTemp) || 0;
            let hum = parseFloat(data.humidity) || 0;
            let sunPercent = parseFloat(data.sunlight) || 0;
            let lux = parseFloat(data.lux) || 0;

            let tPrec =
              data.tempPrecision !== undefined ? data.tempPrecision : 2;
            let hPrec = data.humPrecision !== undefined ? data.humPrecision : 2;

            setValue("outsideTemp", outside.toFixed(tPrec), "°C");
            setValue("solarTemp", solar.toFixed(tPrec), "°C");
            document.getElementById("humidity").textContent =
              hum.toFixed(hPrec);

            colorOutsideTemp(outside);
            colorSolarTemp(solar);

            // Sun Map update
            updateSunMap(
              data.sunrise,
              data.sunset,
              data.sunriseMin,
              data.sunsetMin,
              sunPercent,
              lux,
            );
          })
          .catch(() => {
            // If request fails → show zero values
            setValue("outsideTemp", "0", "°C");
            setValue("solarTemp", "0", "°C");
            document.getElementById("humidity").textContent = "0";
          });
      }

      function setValue(id, value, unit) {
        document.getElementById(id).innerHTML =
          value + ' <span class="unit">' + unit + "</span>";
      }

      function colorOutsideTemp(val) {
        let el = document.getElementById("outsideTemp");
        el.style.color = "#FF7859";
      }

      function colorSolarTemp(val) {
        let el = document.getElementById("solarTemp");
        el.style.color = "#CF91FF";
      }

      // Run immediately
      updateDashboard();

      // Update every 2 seconds
      setInterval(updateDashboard, 2000);

      function updateDateTime() {
        const now = new Date();

        const options = {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false, // change to true if you want 12H format
        };

        document.getElementById("dateTime").innerText = now.toLocaleString(
          "en-IN",
          options,
        );
      }

      updateDateTime();
      setInterval(updateDateTime, 1000); // update every second

      function openSetup() {
        window.location.href = "config.html";
      }

      function updateSunMap(
        sunriseStr,
        sunsetStr,
        sunriseMin,
        sunsetMin,
        sunPercent,
        lux,
      ) {
        document.getElementById("sunriseTime").textContent =
          sunriseStr || "--:--";
        document.getElementById("sunsetTime").textContent =
          sunsetStr || "--:--";

        // Calculate and display Solar Noon
        if (sunriseMin && sunsetMin && sunsetMin > sunriseMin) {
          var noonMin = Math.round((sunriseMin + sunsetMin) / 2);
          var noonH = Math.floor(noonMin / 60);
          var noonM = noonMin % 60;
          document.getElementById("solarNoonTime").textContent =
            (noonH < 10 ? "0" : "") +
            noonH +
            ":" +
            (noonM < 10 ? "0" : "") +
            noonM;
        } else {
          document.getElementById("solarNoonTime").textContent = "--:--";
        }

        var svgEl = document.querySelector(".sun-arc-svg");

        // Update stats
        document.getElementById("sunMapPercent").textContent =
          sunPercent != null ? Math.round(sunPercent) + "%" : "--%";
        document.getElementById("sunMapLux").textContent =
          lux != null ? Math.round(lux) + " lx" : "-- lx";

        if (!sunriseMin || !sunsetMin || sunsetMin <= sunriseMin) {
          document.getElementById("sunStatus").textContent = "No sun data";
          document.getElementById("sunMapAngle").textContent = "--°";
          return;
        }

        var now = new Date();
        var nowMin = now.getHours() * 60 + now.getMinutes();
        var totalDay = sunsetMin - sunriseMin;
        var progress = (nowMin - sunriseMin) / totalDay;

        var statusEl = document.getElementById("sunStatus");
        var sunDot = document.getElementById("sunDot");
        var sunGlow = document.getElementById("sunGlow");
        var sunGlowOuter = document.getElementById("sunGlowOuter");
        var arcActive = document.getElementById("sunArcActive");

        if (nowMin < sunriseMin) {
          var minsLeft = sunriseMin - nowMin;
          statusEl.textContent =
            "Sunrise in " +
            Math.floor(minsLeft / 60) +
            "h " +
            (minsLeft % 60) +
            "m";
          progress = 0;
        } else if (nowMin > sunsetMin) {
          statusEl.textContent = "Sun has set";
          progress = 1;
        } else {
          var minsLeft = sunsetMin - nowMin;
          statusEl.textContent =
            "Sunset in " +
            Math.floor(minsLeft / 60) +
            "h " +
            (minsLeft % 60) +
            "m";
        }

        // Sun elevation angle: 0° at horizon, peaks at ~90° (scaled by arc)
        // Using sine model: angle = maxAngle * sin(progress * PI)
        var sunAngle;
        if (progress <= 0 || progress >= 1) {
          sunAngle = 0;
        } else {
          sunAngle = 90 * Math.sin(progress * Math.PI);
        }
        document.getElementById("sunMapAngle").textContent =
          Math.round(sunAngle) + "°";

        progress = Math.max(0, Math.min(1, progress));

        // Quadratic bezier: P0(20,120) CP(150,-25) P1(280,120)
        var t = progress;
        var x = (1 - t) * (1 - t) * 20 + 2 * (1 - t) * t * 150 + t * t * 280;
        var y = (1 - t) * (1 - t) * 120 + 2 * (1 - t) * t * -25 + t * t * 120;

        sunDot.setAttribute("cx", x);
        sunDot.setAttribute("cy", y);
        sunGlow.setAttribute("cx", x);
        sunGlow.setAttribute("cy", y);
        sunGlowOuter.setAttribute("cx", x);
        sunGlowOuter.setAttribute("cy", y);

        // Partial arc up to current position
        if (progress > 0 && progress < 1) {
          var pathD = "M 20 120";
          var steps = Math.round(t * 50);
          for (var i = 1; i <= steps; i++) {
            var st = i / 50;
            var sx =
              (1 - st) * (1 - st) * 20 +
              2 * (1 - st) * st * 150 +
              st * st * 280;
            var sy =
              (1 - st) * (1 - st) * 120 +
              2 * (1 - st) * st * -25 +
              st * st * 120;
            pathD += " L " + sx.toFixed(1) + " " + sy.toFixed(1);
          }
          arcActive.setAttribute("d", pathD);
          arcActive.setAttribute("opacity", "0.6");
          sunDot.setAttribute("opacity", "0.95");
          sunGlow.setAttribute("opacity", "0.2");
          sunGlowOuter.setAttribute("opacity", "0.08");
          svgEl.classList.remove("sun-glow-off");
        } else if (progress >= 1) {
          arcActive.setAttribute("d", "M 20 120 Q 150 -25 280 120");
          arcActive.setAttribute("opacity", "0.2");
          sunDot.setAttribute("opacity", "0.3");
          sunGlow.setAttribute("opacity", "0.05");
          sunGlowOuter.setAttribute("opacity", "0");
          svgEl.classList.add("sun-glow-off");
        } else {
          arcActive.setAttribute("d", "M 0 0");
          arcActive.setAttribute("opacity", "0");
          sunDot.setAttribute("opacity", "0.4");
          sunGlow.setAttribute("opacity", "0.08");
          sunGlowOuter.setAttribute("opacity", "0");
          svgEl.classList.add("sun-glow-off");
        }
      }
    </script>
    <div class="setup-btn" onclick="openSetup()">⚙️</div>
  </body>
</html>
